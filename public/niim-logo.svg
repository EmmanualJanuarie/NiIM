  <title id="title">NiIM logo</title>
  <desc id="desc">Black square app icon with white NiIM lettering for Nothing is Impossible.</desc>
  <rect width="1024" height="1024" rx="188" fill="#050505"/>
  <rect x="54" y="54" width="916" height="916" rx="150" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="8"/>
  <text
    x="512"
    y="575"
