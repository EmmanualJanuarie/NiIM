[build]
  command = "pnpm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/auth/authorize"
  to = "/.netlify/functions/auth-authorize"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
