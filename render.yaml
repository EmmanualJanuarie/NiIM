services:
  - type: web
    name: niim
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NIIM_DATA_DIR
        value: /var/data
    disk:
      name: niim-data
      mountPath: /var/data
      sizeGB: 1
